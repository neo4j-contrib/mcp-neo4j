# Neo4j 3.5 Compatible pyproject.toml
# Rename this to pyproject.toml to use with Neo4j 3.5

[project]
name = "mcp-neo4j-cypher"
version = "0.5.2-neo4j35"
description = "A simple Neo4j MCP server (Neo4j 3.5 compatible)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "fastmcp>=2.10.5",
    "neo4j>=1.7.0,<2.0.0",  # Neo4j 3.5 compatible driver
    "pydantic>=2.10.1",
    "tiktoken>=0.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
dev-dependencies = [
    "pyright>=1.1.389",
    "pytest>=7.0.0",
    "pytest-asyncio>=0.20.3",
    "ruff>=0.11.5",
    "testcontainers>=4.10.0",
    "aiohttp>=3.8.0"
]

[project.scripts]
mcp-neo4j-cypher = "mcp_neo4j_cypher:main"
